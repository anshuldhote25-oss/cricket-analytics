# ============================================================
# Cricket Analytics AI Agent — Nginx Configuration
# ============================================================
# Replaces /opt/homebrew/etc/nginx/nginx.conf (Apple Silicon)
# or /usr/local/etc/nginx/nginx.conf (Intel Mac)
#
# BEFORE USING: replace YOUR_MAC_USERNAME with output of: whoami
# ============================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL certificate paths — update YOUR_MAC_USERNAME
        ssl_certificate     /Users/YOUR_MAC_USERNAME/.ssl/cricket/cricket.crt;
        ssl_certificate_key /Users/YOUR_MAC_USERNAME/.ssl/cricket/cricket.key;

        # TLS settings — TLS 1.2 minimum, TLS 1.3 preferred
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Proxy all requests to FastAPI backend
        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_buffering    off;
        }

        # Serve static assets directly with caching
        location /assets/ {
            proxy_pass http://127.0.0.1:8000;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
